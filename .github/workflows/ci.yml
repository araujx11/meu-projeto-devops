name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  testes:
    name: Rodar Testes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes com pytest
        run: python -m pytest app/test_main.py -v

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Construir imagem Docker
        run: docker build -t minha-api:${{ github.sha }} .

      - name: Verificar que o container sobe
        run: |
          docker run -d -p 5000:5000 --name teste-api minha-api:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/saude
          docker stop teste-api

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Simular deploy
        run: |
          echo "✅ Testes passaram"
          echo "✅ Imagem Docker construída"
          echo "🚀 Deploy realizado com sucesso!"
          echo "Versão: ${{ github.sha }}"