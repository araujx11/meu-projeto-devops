services:

  api:
    build: .
    container_name: devops-api
    ports:
      - "5000:5000"
    environment:
      - AMBIENTE=producao
    depends_on:
      banco:
        condition: service_healthy
    restart: unless-stopped

  banco:
    image: postgres:16-alpine
    container_name: devops-banco
    environment:
      - POSTGRES_USER=usuario
      - POSTGRES_PASSWORD=senha
      - POSTGRES_DB=devopsdb
    volumes:
      - dados_banco:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d devopsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dados_banco: